<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATS LinkedIn Scraper</title>
  <style>
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      margin: 0;
      color: #1d2129;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #0a66c2;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    .toggle-label {
      font-size: 13px;
      font-weight: 500;
      color: #333;
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 22px;
      transition: 0.2s;
    }
    .toggle-slider:before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    input:checked + .toggle-slider { background: #0a66c2; }
    input:checked + .toggle-slider:before { transform: translateX(16px); }
    .status-box {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
    }
    .status-box.synced  { background: #e8f5e9; color: #1b5e20; }
    .status-box.error   { background: #fdecea; color: #b71c1c; }
    .status-box.idle    { background: #f5f5f5; color: #555; }
    .meta {
      font-size: 11px;
      color: #888;
      margin-top: 6px;
    }
    .record-id {
      font-size: 10px;
      color: #aaa;
      font-family: monospace;
      margin-top: 2px;
      word-break: break-all;
    }
    .btn-settings {
      display: block;
      margin-top: 14px;
      padding: 7px 0;
      text-align: center;
      font-size: 12px;
      color: #0a66c2;
      background: #f0f7ff;
      border: 1px solid #cce0f5;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-settings:hover { background: #deeefb; }
    .recruit-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    .recruit-section h4 {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 700;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .recruit-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      margin-bottom: 3px;
      margin-top: 8px;
    }
    .recruit-label:first-of-type { margin-top: 0; }
    .recruit-select {
      width: 100%;
      padding: 5px 7px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      color: #1d2129;
      background: #fff;
    }
    .recruit-select.error { border-color: #e57373; color: #b71c1c; }
    .btn-send {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 7px 0;
      background: #5C2D91;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .btn-send:hover:not(:disabled) { background: #4a2274; }
    .btn-send:disabled { opacity: 0.6; cursor: default; }
    .send-status {
      font-size: 11px;
      margin-top: 6px;
      padding: 4px 8px;
      border-radius: 4px;
      display: none;
    }
    .send-status.ok   { display: block; background: #e8f5e9; color: #1b5e20; }
    .send-status.fail { display: block; background: #fdecea; color: #b71c1c; }
  </style>
</head>
<body>
  <h3 style="color:#5C2D91;">Lancor Search OS</h3>
  <div id="lancorStatusBox" class="status-box idle" style="margin-bottom:8px;">Lancor: waiting for sync…</div>

  <div class="toggle-row">
    <span class="toggle-label">Auto-sync enabled</span>
    <label class="toggle-switch">
      <input type="checkbox" id="enableToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div id="statusBox" class="status-box idle">Loading...</div>
  <div id="metaInfo" class="meta"></div>
  <div id="recordId" class="record-id"></div>
  <a class="btn-settings" id="optionsLink">Open Settings</a>

  <div id="recruitSection" class="recruit-section" style="display:none">
    <h4>Add to Lancor Search</h4>
    <label class="recruit-label" for="employerSelect">Current Employer</label>
    <select id="employerSelect" class="recruit-select"></select>
    <label class="recruit-label" for="searchSelect">Search Project</label>
    <select id="searchSelect" class="recruit-select"></select>
    <button id="sendToRecruitBtn" class="btn-send">Add to Active Search</button>
    <div id="sendStatus" class="send-status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
