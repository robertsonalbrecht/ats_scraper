<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATS LinkedIn Scraper</title>
  <style>
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      margin: 0;
      color: #1d2129;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #0a66c2;
    }
    .status-box {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
    }
    .status-box.synced  { background: #e8f5e9; color: #1b5e20; }
    .status-box.error   { background: #fdecea; color: #b71c1c; }
    .status-box.idle    { background: #f5f5f5; color: #555; }
    .meta {
      font-size: 11px;
      color: #888;
      margin-top: 6px;
    }
    .record-id {
      font-size: 10px;
      color: #aaa;
      font-family: monospace;
      margin-top: 2px;
      word-break: break-all;
    }
    .btn-settings {
      display: block;
      margin-top: 14px;
      padding: 7px 0;
      text-align: center;
      font-size: 12px;
      color: #0a66c2;
      background: #f0f7ff;
      border: 1px solid #cce0f5;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-settings:hover { background: #deeefb; }
  </style>
</head>
<body>
  <h3>ATS LinkedIn Scraper</h3>
  <div id="statusBox" class="status-box idle">Loading...</div>
  <div id="metaInfo" class="meta"></div>
  <div id="recordId" class="record-id"></div>
  <a class="btn-settings" id="optionsLink">Open Settings</a>
  <script src="popup.js"></script>
</body>
</html>
