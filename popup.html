<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATS LinkedIn Scraper</title>
  <style>
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      margin: 0;
      color: #1d2129;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #0a66c2;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    .toggle-label {
      font-size: 13px;
      font-weight: 500;
      color: #333;
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 22px;
      transition: 0.2s;
    }
    .toggle-slider:before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    input:checked + .toggle-slider { background: #0a66c2; }
    input:checked + .toggle-slider:before { transform: translateX(16px); }
    .status-box {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
    }
    .status-box.synced  { background: #e8f5e9; color: #1b5e20; }
    .status-box.error   { background: #fdecea; color: #b71c1c; }
    .status-box.idle    { background: #f5f5f5; color: #555; }
    .meta {
      font-size: 11px;
      color: #888;
      margin-top: 6px;
    }
    .record-id {
      font-size: 10px;
      color: #aaa;
      font-family: monospace;
      margin-top: 2px;
      word-break: break-all;
    }
    .btn-settings {
      display: block;
      margin-top: 14px;
      padding: 7px 0;
      text-align: center;
      font-size: 12px;
      color: #0a66c2;
      background: #f0f7ff;
      border: 1px solid #cce0f5;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-settings:hover { background: #deeefb; }
  </style>
</head>
<body>
  <h3>ATS LinkedIn Scraper</h3>

  <div class="toggle-row">
    <span class="toggle-label">Auto-sync enabled</span>
    <label class="toggle-switch">
      <input type="checkbox" id="enableToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div id="statusBox" class="status-box idle">Loading...</div>
  <div id="metaInfo" class="meta"></div>
  <div id="recordId" class="record-id"></div>
  <a class="btn-settings" id="optionsLink">Open Settings</a>
  <script src="popup.js"></script>
</body>
</html>
